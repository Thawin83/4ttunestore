<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POS + Designer</title>
<style>
body{
    font-family:'Segoe UI', sans-serif;
    margin:0;
    background:#ffffff;
    color:#fff;
}
nav{
    background:#ffffff;
    padding:15px 30px;
    display:flex;
    gap:25px;
    border-bottom:2px solid #f1f1f1;
    position:sticky;
    top:0;
    z-index:1000;
}
nav a{
    color:#ff6a00;
    text-decoration:none;
    font-weight:600;
    transition:0.3s;
}
nav a:hover{
    color:#ff914d;
}
header{
    background:linear-gradient(135deg,#ff6a00,#ff914d);
    padding:30px;
    text-align:center;
    font-size:28px;
    font-weight:bold;
}
.container{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:30px;
    padding:30px;
}
.panel{
    background:#222;
    padding:20px;
    border-radius:15px;
    width:320px;
    box-shadow:0 10px 25px rgba(0,0,0,0.5);
}
canvas{
    border:2px solid #fff;
    border-radius:10px;
    background:#fff;
    display:block;
    margin:auto;
}
label, select, button{
    margin-top:10px;
    display:block;
    width:100%;
    font-weight:bold;
}
button{
    background:#ff6a00;
    color:#fff;
    padding:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    transition:0.3s;
}
button:hover{
    background:#ff914d;
}
.collection{
    margin-top:10px;
}
.order-summary{
    margin-top:20px;
    background:#333;
    padding:15px;
    border-radius:10px;
}
</style>
</head>
<body>

<!-- Navbar -->
<nav>
  <a href="index.html">🏠 หน้าแรก</a>

  <a href="bmc.html">📊 Business Model</a>

  <a href="pdca.html">🔄 PDCA</a>

</nav>

<style>
/* Navbar */
nav {
    background: #ffffff;
    padding: 15px 0;
    display: flex;
    justify-content: center; /* จัดตรงกลาง */
    gap: 30px;               /* ระยะห่างระหว่างลิงก์ */
    border-bottom: 2px solid #f1f1f1;
    flex-wrap: wrap;         /* รองรับหน้าจอเล็ก */
}

nav a {
    color: #ff6a00;
    text-decoration: none;
    font-weight: 600;
    font-size: 16px;
    padding: 8px 12px;
    border-radius: 8px;
    transition: 0.3s;
}

nav a:hover {
    color: white;
    background: linear-gradient(135deg, #ff6a00, #ff914d);
    transform: scale(1.1);
}

nav a.active {
    background: linear-gradient(135deg, #ff6a00, #ff914d);
    color: white;
    transform: scale(1.05);
}
</style>

<header>ออกแบบเสื้อผ้าแฟชั่น POS + Designer</header>

<div class="container">

<div class="panel">
<h3>เลือกทรงเสื้อ</h3>
<select id="shirtType">
<option value="tshirt">T-shirt</option>
<option value="hoodie">Hoodie</option>
<option value="longsleeve">Long Sleeve</option>
</select>

<h3>เลือกสีเสื้อ</h3>
<input type="color" id="shirtColor" value="#ff6a00">

<h3>เลือกไซส์</h3>
<select id="shirtSize">
<option value="S">S</option>
<option value="M">M</option>
<option value="L">L</option>
<option value="XL">XL</option>
</select>

<h3>คอลเลคชั่น</h3>
<select id="collection">
<option value="summer">Summer 2026</option>
<option value="autumn">Autumn 2026</option>
<option value="winter">Winter 2026</option>
</select>

<h3>วาดลายเอง</h3>
<canvas id="canvas" width="300" height="400"></canvas>
<button onclick="drawPattern()">วาดลาย</button>

<button onclick="addToCart()">เพิ่มใส่ตะกร้า 🛒</button>
<button onclick="shareDesign()">แชร์แบบ 🎉</button>
</div>

<div class="panel">
<h3>ออเดอร์และสรุป</h3>
<div class="order-summary" id="orderSummary">
<p>ยังไม่มีสินค้าในตะกร้า</p>
</div>
<button onclick="addOrder()">เพิ่มออเดอร์ +</button>
</div>

</div>

<script>
let canvas=document.getElementById('canvas');
let ctx=canvas.getContext('2d');

function drawShirt(){
    let color=document.getElementById('shirtColor').value;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle=color;
    let type=document.getElementById('shirtType').value;
    if(type==='tshirt'){ ctx.fillRect(50,100,200,200); }
    else if(type==='hoodie'){ ctx.fillRect(40,80,220,240); }
    else { ctx.fillRect(45,90,210,230); }
}
drawShirt();

function drawPattern(){
    drawShirt();
    ctx.strokeStyle='black';
    ctx.lineWidth=3;
    ctx.beginPath();
    ctx.moveTo(60,120);
    ctx.lineTo(240,280);
    ctx.moveTo(240,120);
    ctx.lineTo(60,280);
    ctx.stroke();
}

let cart=[];
function addToCart(){
    let shirt={
        type: document.getElementById('shirtType').value,
        color: document.getElementById('shirtColor').value,
        size: document.getElementById('shirtSize').value,
        collection: document.getElementById('collection').value
    };
    cart.push(shirt);
    updateOrderSummary();
}

function updateOrderSummary(){
    let div=document.getElementById('orderSummary');
    if(cart.length===0){
        div.innerHTML='<p>ยังไม่มีสินค้าในตะกร้า</p>';
        return;
    }
    let html='<ul>';
    cart.forEach((item,i)=>{
        html+=`<li>#${i+1} ${item.type}, สี ${item.color}, ไซส์ ${item.size}, คอลเลคชั่น ${item.collection}</li>`;
    });
    html+='</ul>';
    div.innerHTML=html;
}

function addOrder(){
    alert('เพิ่มออเดอร์ใหม่เรียบร้อย 🎉');
}

function shareDesign(){
    let link = canvas.toDataURL();
    let a=document.createElement('a');
    a.href=link;
    a.download='my_design.png';
    a.click();
}

document.getElementById('shirtType').addEventListener('change',drawShirt);
document.getElementById('shirtColor').addEventListener('input',drawShirt);
</script>

</body>
</html>
